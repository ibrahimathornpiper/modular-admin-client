<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Client Admin - Setup</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: 'Inter', sans-serif; 
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 40px;
      width: 100%;
      max-width: 400px;
    }
    h1 { color: white; margin-bottom: 8px; font-size: 24px; }
    p { color: rgba(255,255,255,0.7); margin-bottom: 24px; font-size: 14px; }
    label { color: rgba(255,255,255,0.8); display: block; margin-bottom: 6px; font-size: 14px; }
    input {
      width: 100%;
      padding: 12px 16px;
      margin-bottom: 16px;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 8px;
      background: rgba(255,255,255,0.05);
      color: white;
      font-size: 14px;
    }
    input::placeholder { color: rgba(255,255,255,0.5); }
    input[type="color"] { height: 44px; padding: 4px; cursor: pointer; }
    button {
      width: 100%;
      padding: 12px;
      background: #4f46e5;
      border: none;
      border-radius: 8px;
      color: white;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #4338ca; }
    .error { color: #ef4444; margin-bottom: 16px; font-size: 14px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Setup</h1>
    <p>Configure your client admin panel</p>
    <div class="error" id="error"></div>
    <form id="setupForm">
      <label>Admin Email</label>
      <input type="email" id="email" placeholder="admin@client.com" required>
      
      <label>Password</label>
      <input type="password" id="password" placeholder="Password" required>
      
      <label>Site Name</label>
      <input type="text" id="siteName" placeholder="My Company" required>
      
      <label>Primary Color</label>
      <input type="color" id="primaryColor" value="#4f46e5">
      
      <label>License Key</label>
      <input type="text" id="licenseKey" placeholder="Enter your license key" required>
      
      <button type="submit">Complete Setup</button>
    </form>
  </div>
  <script>
    document.getElementById('setupForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const formData = {
        email: document.getElementById('email').value,
        password: document.getElementById('password').value,
        siteName: document.getElementById('siteName').value,
        primaryColor: document.getElementById('primaryColor').value,
        licenseKey: document.getElementById('licenseKey').value
      };
      const error = document.getElementById('error');
      
      try {
        const res = await fetch('/admin/api/setup', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(formData)
        });
        const data = await res.json();
        
        if (data.message) {
          window.location.href = '/admin/login';
        } else {
          error.textContent = data.error || 'Setup failed';
        }
      } catch (err) {
        error.textContent = 'Connection error';
      }
    });
  </script>
</body>
</html>
